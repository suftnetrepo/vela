<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" width="512" height="512">
  <!-- Premium, calm Vela splash screen -->
  <!-- Rose theme color scheme -->
  
  <!-- Background: Solid pale pink -->
  <defs>
    <!-- Subtle radial gradient for depth -->
    <radialGradient id="bgGradient" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#FFFCFD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFFBFC;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Base background -->
  <rect width="512" height="512" fill="#FFFBFC"/>
  
  <!-- Subtle gradient overlay -->
  <rect width="512" height="512" fill="url(#bgGradient)" opacity="0.8"/>

  <!-- Centered content -->
  <g>
    <!-- Flower mark (stylized 6-petal bloom) -->
    <!-- Positioned vertically centered with adequate top margin -->
    <g transform="translate(256, 180)">
      <!-- Petals using circles (soft, organic flower shape) -->
      <!-- Primary color: Rose #E8748A -->
      
      <!-- Top petal -->
      <circle cx="0" cy="-30" r="18" fill="#E8748A" opacity="0.9"/>
      <!-- Top-right petal -->
      <circle cx="26" cy="-15" r="18" fill="#E8748A" opacity="0.9"/>
      <!-- Bottom-right petal -->
      <circle cx="26" cy="15" r="18" fill="#E8748A" opacity="0.9"/>
      <!-- Bottom petal -->
      <circle cx="0" cy="30" r="18" fill="#E8748A" opacity="0.9"/>
      <!-- Bottom-left petal -->
      <circle cx="-26" cy="15" r="18" fill="#E8748A" opacity="0.9"/>
      <!-- Top-left petal -->
      <circle cx="-26" cy="-15" r="18" fill="#E8748A" opacity="0.9"/>
      
      <!-- Center circle (solid filled) -->
      <circle cx="0" cy="0" r="14" fill="#E8748A" opacity="1"/>
    </g>

    <!-- "Vela" wordmark -->
    <!-- Font: Plus Jakarta Sans Bold (700-weight) -->
    <!-- Positioned below flower with proper spacing -->
    <text 
      x="256"
      y="300"
      font-family="'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
      font-size="56"
      font-weight="700"
      fill="#E8748A"
      text-anchor="middle"
      letter-spacing="-1.2"
      dominant-baseline="middle"
    >
      Vela
    </text>
  </g>
</svg>

